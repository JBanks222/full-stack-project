<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal - Study Vault</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="app-shell">
    <aside class="sidebar">
        <nav>
            <ul>
                <li><a href="/workspace">Workspace</a></li>
                <li><a href="/tasks">Queue</a></li>
                <li><a href="/journal">Journal</a></li>
                <li><a href="/vault">Vault</a></li>
                <li><a href="/settings">Settings</a></li>
            </ul>
        </nav>
    </aside>
    <main class="main-content">
        <h1>Journal</h1>
        <button class="new-entry">New Entry</button>
        <section class="journal-cards">
            <div class="journal-card">
                <h2>Title 1</h2>
                <p>Excerpt of the journal entry...</p>
                <span>Date: 2026-05-11</span>
                <div class="actions">
                    <button>Like</button>
                    <button>Comment</button>
                </div>
            </div>
            <div class="journal-card">
                <h2>Title 2</h2>
                <p>Excerpt of another journal entry...</p>
                <span>Date: 2026-05-10</span>
                <div class="actions">
                    <button>Like</button>
                    <button>Comment</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
